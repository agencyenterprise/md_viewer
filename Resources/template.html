<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Markdown</title>
<style>/*__GITHUB_MARKDOWN_CSS__*/</style>
<style>/*__HIGHLIGHT_LIGHT_CSS__*/</style>
<style media="(prefers-color-scheme: dark)">/*__HIGHLIGHT_DARK_CSS__*/</style>
<style>
  :root { color-scheme: light dark; }
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    html, body { background: #0d1117; }
  }
  .container {
    box-sizing: border-box;
    max-width: 980px;
    margin: 0 auto;
    padding: 32px 45px 64px;
  }
  .markdown-body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue",
                 Helvetica, Arial, sans-serif !important;
  }
  .markdown-body pre code.hljs { padding: 0; background: transparent; }
</style>
<script>/*__MARKED_JS__*/</script>
<script>/*__HIGHLIGHT_JS__*/</script>
</head>
<body>
<div class="container">
  <article id="content" class="markdown-body"></article>
</div>
<script>
(function () {
  var md = "__MARKDOWN_PAYLOAD__";
  var html;
  try {
    if (typeof marked !== "undefined") {
      if (typeof marked.setOptions === "function") {
        marked.setOptions({ gfm: true, breaks: false });
      }
      html = (typeof marked.parse === "function") ? marked.parse(md) : marked(md);
    } else {
      var pre = document.createElement("pre");
      pre.textContent = md;
      html = pre.outerHTML;
    }
  } catch (err) {
    var pre2 = document.createElement("pre");
    pre2.textContent = "Render error: " + err + "\n\n" + md;
    html = pre2.outerHTML;
  }

  var content = document.getElementById("content");
  content.innerHTML = html;

  if (typeof hljs !== "undefined") {
    content.querySelectorAll("pre code").forEach(function (block) {
      try {
        var langMatch = (block.className || "").match(/language-([\w+\-]+)/);
        var result;
        if (langMatch && hljs.getLanguage(langMatch[1])) {
          result = hljs.highlight(block.textContent, { language: langMatch[1] });
        } else {
          result = hljs.highlightAuto(block.textContent);
        }
        block.innerHTML = result.value;
        block.classList.add("hljs");
      } catch (e) { /* ignore */ }
    });
  }
})();
</script>
</body>
</html>
